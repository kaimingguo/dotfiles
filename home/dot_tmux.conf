# -*- mode: tmux; tab-width: 2; indent-tabs-mode: nil -*- ;; Emacs
# vi: set filetype=tmux tabstop=2 shiftwidth=2 expandtab :: Vi/ViM

# ----------------------------------------------------------------------------
# Options
# ----------------------------------------------------------------------------

# Enable RGB/True colour support for modern terminal emulators
set-option -g default-terminal 'xterm-256color'
set-option -as terminal-overrides ',xterm-256col*:Tc,alacritty:Tc,gnome*:Tc'

# Use vi-style key bindings in copy mode and status line
set-option -g mode-keys vi
set-option -gw status-keys vi

# Disable key repetition delay for instant Esc key response (crucial for Vim/Neovim)
set-option -sg escape-time 0

# Start window and pane indexes from 1 instead of 0 for easier keyboard reach
set-option -g base-index 1
set-option -gw pane-base-index 1

# Automatically renumber windows when any window is closed
set-option -g renumber-windows on
set-window-option -g automatic-rename on

# Update parent terminal title to reflect host, session, and current window
set-option -g set-titles on
set-option -g set-titles-string "#h : #S : #I #W"

# Enable mouse support for scrolling, pane resizing, and selecting
set-option -g mouse on

# Increase scrollback history limit (50,000 lines for heavy logging/debugging)
set-option -g history-limit 50000

# Monitor window activity visually in the status bar
set-option -g visual-activity on
set-window-option -g monitor-activity on

# Disable all audio and visual bells
set-option -g visual-bell off
set-option -g visual-silence off
set-option -g bell-action none

# ----------------------------------------------------------------------------
# Binding Keys
# ----------------------------------------------------------------------------

# Unbind default split-window shortcuts
unbind-key '"'
unbind-key %

# Configure standard Prefix key (Ctrl+b)
set -g prefix C-b
bind C-b send-prefix

# Choose buffer from list
bind-key '}' choose-buffer

# Quick window navigation (-r allows repeatable key presses without hitting Prefix again)
bind-key -r C-n next-window
bind-key -r N previous-window

# Intuitive pane splitting (automatically inherits current working directory)
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Vi-style pane selection
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Vi-style repeatable pane resizing
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Reload configuration file on the fly
bind-key R source-file ~/.tmux.conf \; display-message "source-file done"

# ----------------------------------------------------------------------------
# Copy mode & multi-environment clipboard bypass (OSC 52 + native tools)
# ----------------------------------------------------------------------------

# Enable OSC 52 clipboard sequence forwarding. This handles remote-to-local
# clipboard bypass over SSH into any machine automatically.
set -s set-clipboard on

bind-key -Tcopy-mode-vi v send -X begin-selection
bind-key -Tcopy-mode-vi Space send -X cursor-right

# Cascading clipboard detection logic for Local Environments (Cascading %if-shell chains)
%if #{>=|f:#{version},3.2}
  if-shell -b 'command -v pbcopy > /dev/null 2>&1' {
    set-option -gs copy-command "pbcopy"
  } {
    if-shell -b 'command -v clip.exe > /dev/null 2>&1' {
      set-option -gs copy-command "clip.exe"
    } {
      if-shell -b 'command -v xclip > /dev/null 2>&1' {
        set-option -gs copy-command "xclip -selection clipboard -in"
      } {
        if-shell -b 'command -v xsel > /dev/null 2>&1' {
          set-option -gs copy-command "xsel -clipboard -input"
        }
      }
    }
  }

  # Modern syntax for yanking (Pipes to copy-command if set, otherwise falls back to OSC 52)
  bind-key -Tcopy-mode-vi y send -X copy-pipe-and-cancel \; delete-buffer \; display-message "Copied to clipboard"
%else
  # Fallback logic for older Tmux versions (< 3.2)
  if-shell -b 'command -v pbcopy > /dev/null 2>&1' \
    "bind-key -Tcopy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
    "if-shell -b 'command -v clip.exe > /dev/null 2>&1' \
      \"bind-key -Tcopy-mode-vi y send -X copy-pipe-and-cancel 'clip.exe'\" \
      \"if-shell -b 'command -v xclip > /dev/null 2>&1' \
        \\\"bind-key -Tcopy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard -in'\\\" \
        \\\"bind-key -Tcopy-mode-vi y send -X copy-pipe-and-cancel\\\"\"" # Unset command triggers OSC 52 automatically
%endif

# Native Paste Binding Optimization (Prefix + ])
# Fetches from local system clipboards if running natively on host
if-shell -b 'command -v pbpaste > /dev/null 2>&1' {
  bind-key ] run -b "pbpaste | tmux load-buffer - && tmux paste-buffer -d"
} {
  if-shell -b 'command -v powershell.exe > /dev/null 2>&1' {
    # WSL & MSYS2 can leverage powershell.exe to extract the raw windows clipboard safely
    bind-key ] run -b "powershell.exe -NoProfile -Command Get-Clipboard | tr -d '\\r' | tmux load-buffer - && tmux paste-buffer -d"
  } {
    if-shell -b 'command -v xclip > /dev/null 2>&1' {
      bind-key ] run -b "xclip -selection clipboard -out | tmux load-buffer - && tmux paste-buffer -d"
    }
  }
}

# ----------------------------------------------------------------------------
# Smart SSH Environment Detection Hooks
# ----------------------------------------------------------------------------
# These hooks monitor pane command changes. If the current command is 'ssh', 
# it actively tints the pane borders to Crimson/Red as an instant visual indicator.
set-hook -g pane-mode-changed 'if-shell "ps -t #{pane_tty} -o args= | grep -qE \"(^| )ssh \"" "set -wb pane-active-border-style fg=color160,bold" "set -wu pane-active-border-style"'
set-hook -g window-layout-changed 'if-shell "ps -t #{pane_tty} -o args= | grep -qE \"(^| )ssh \"" "set -wb pane-active-border-style fg=color160,bold" "set -wu pane-active-border-style"'

# ----------------------------------------------------------------------------
# Interfaces
# ----------------------------------------------------------------------------

set-option -g status-interval 5
set-option -g status-justify left

# It dynamically forks at the root conditional:
#   - True (pts/pty/ttys): Checks if command is 'ssh', appends '[SSH] ' if true, then appends Hostname.
#   - False (ttyvN/ttyN): Outputs full Hostname, Time, and Date format.
set-option -g status-right-length 100
set -g status-right '#{?#{m/ri:(pts|pty|ttys),#{client_tty}},#{?#{==:#{pane_current_command},ssh},[SSH] ,}#H ,#H | %H:%M | %d-%b-%y }'

